<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#gradient-bg)"/>
  
  <!-- Code brackets icon -->
  <path d="M24 40L16 32L24 24" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M40 40L48 32L40 24" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Center slash -->
  <path d="M36 22L28 42" stroke="url(#gradient-accent)" stroke-width="3.5" stroke-linecap="round"/>
  
  <!-- Small accent dot -->
  <circle cx="46" cy="18" r="3" fill="url(#gradient-accent)"/>
  
  <defs>
    <linearGradient id="gradient-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="gradient-accent" x1="16" y1="16" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#d946ef"/>
    </linearGradient>
  </defs>
</svg>
